name: Go CI

on:
  pull_request:
    paths:
      - "cmd/**"
      - "internal/**"
      - "db/migrations/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "Dockerfile.nyan-go"
      - ".github/workflows/go-ci.yml"
  push:
    branches:
      - master
    paths:
      - "cmd/**"
      - "internal/**"
      - "db/migrations/**"
      - "go.mod"
      - "go.sum"
      - "Makefile"
      - "Dockerfile.nyan-go"
      - ".github/workflows/go-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify gofmt
        run: |
          set -euo pipefail
          unformatted="$(gofmt -l ./cmd ./internal)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: Verify gofumpt
        run: |
          go install mvdan.cc/gofumpt@latest
          unformatted="$(gofumpt -l ./cmd ./internal)"
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofumpt-formatted:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Run tests
        run: go test ./...

      - name: Run coverage tests
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          if-no-files-found: error

      - name: Run race tests
        run: go test -race ./...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Go runtime image
        run: docker build -f Dockerfile.nyan-go -t vldc-nyan-go:ci .
