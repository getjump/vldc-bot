version: "2"

run:
  timeout: 5m
  tests: true

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - bodyclose
    - gocritic
    - misspell
    - prealloc
    - revive
    - unconvert
    - nilerr
    - nilnil
    - exhaustive
    - errname
    - errorlint
    - forcetypeassert
    - noctx
    - predeclared
    - wastedassign

  settings:
    errcheck:
      exclude-functions:
        - fmt.Sscanf
        - (io.Closer).Close
        - (*os.File).Close
        - os.Remove
        - (database/sql.DB).Close
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        - paramTypeCombine
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          disabled: true
        - name: if-return
        - name: increment-decrement
        - name: var-naming
          disabled: true
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
    exhaustive:
      default-signifies-exhaustive: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
        - unparam
        - forcetypeassert
        - revive
    - path: testutil
      linters:
        - errcheck
        - revive
  max-issues-per-linter: 50
  max-same-issues: 5
